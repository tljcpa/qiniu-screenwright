services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./.secrets/runtime.env
    expose:
      - "8000"
    networks: [web]

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [backend]
    networks: [web]

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
